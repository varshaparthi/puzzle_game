<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puzzle Game</title>
    <style>
        :root {
            /* Responsive Sizing */
            --phone-height: 92vh; 
            --phone-width: calc(var(--phone-height) * (9 / 16));
            --grid-size: 85%; 
            
            /* Assets */
            --img-url: url('3.webp'); 
            --panel-url: url('stars/final_panel_1.webp');
            
            /* Theme Colors */
            --wood-light: #d2a679;
            --wood-dark: #8b5a2b;
            --gold: #f1c40f;
        }

        body {
            background-color: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        .bg-blur {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-image: var(--img-url);
            background-size: cover;
            background-position: center;
            filter: blur(20px);
            z-index: -1;
            opacity: 0.4;
        }

        .mobile-frame {
            width: var(--phone-width);
            height: var(--phone-height);
            max-width: 450px; 
            max-height: 800px;
            background: rgba(0, 0, 0, 0.85);
            border-radius: 4vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            border: 0.8vh solid #333;
        }

        /* UI Header Bars */
        .ui-container {
            width: 90%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 0;
            z-index: 10;
        }

        .ui-bar {
            background: linear-gradient(to bottom, var(--wood-light), var(--wood-dark));
            border: 0.3vh solid #5d3a1a;
            border-radius: 3vh;
            display: flex;
            align-items: center;
            padding: 0.5vh 1.5vh;
            color: white;
            font-weight: bold;
            box-shadow: 0 0.5vh 1vh rgba(0,0,0,0.5);
            font-size: 1.8vh;
        }

        .icon-circle {
            width: 3.2vh;
            height: 3.2vh;
            border-radius: 50%;
            background: var(--gold);
            border: 0.2vh solid #b8860b;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 0.8vh;
            font-size: 1.4vh;
        }

        /* CENTERED TIMER (Back to original position) */
        #timer {
            margin-top: 2.5vh;
            background: rgba(0,0,0,0.7);
            padding: 1vh 3vh;
            border-radius: 1.5vh;
            font-size: 3.5vh; /* Large size */
            font-weight: 800;
            color: #e74c3c;
            border: 0.3vh solid #e74c3c;
            font-variant-numeric: tabular-nums;
        }

        /* Puzzle Board */
        .puzzle-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            width: var(--grid-size);
            aspect-ratio: 1 / 1;
            gap: 0.8%;
            margin-top: 4vh; /* Adjusted for centered timer */
        }

        .tile {
            width: 100%; height: 100%;
            background-image: var(--img-url);
            background-size: 300% 300%;
            cursor: pointer;
            transition: all 0.2s ease;
            border-radius: 10%;
            box-sizing: border-box;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .tile.selected { border: 0.4vh solid #fff; transform: scale(0.9); z-index: 5; box-shadow: 0 0 15px #fff;}
        .tile.correct { border: 0.3vh solid #00ffcc; filter: brightness(1.1); }

        /* Win Panel Modal */
        #win-panel {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 100;
            display: none;
            justify-content: center;
            align-items: center;
            border-radius: 3.2vh;
        }

        .panel-content {
            width: 80%;
            aspect-ratio: 3 / 4;
            background-image: var(--panel-url);
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .star-display {
            margin-top: 50%; 
            width: 65%;
        }


        .restart-btn {
            margin-top: 20%;
            padding: 1.5vh 4vh;
            background: var(--gold);
            border: none;
            border-radius: 3vh;
            font-weight: bold;
            color: #5d3a1a;
            cursor: pointer;
            box-shadow: 0 0.5vh 0 #b8860b;
            font-size: 1.8vh;
        }

        .add-btn {
            background: #4caf50; border: none; border-radius: 50%;
            color: white; cursor: pointer; width: 2.5vh; height: 2.5vh;
            margin-left: 0.8vh; display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

<div class="bg-blur"></div>

<div class="mobile-frame">
    <div class="ui-container">
        <div class="ui-bar">
            <div class="icon-circle">🏠</div>
            <span id="level-display">Lv. 1</span>
            <button class="add-btn" onclick="increaseLevel()">+</button>
        </div>
        <div class="ui-bar" style="padding: 0.5vh;">
            <div class="icon-circle" style="margin:0;">⚙️</div>
        </div>
    </div>

    <div id="timer">01:00</div>

    <div class="puzzle-board" id="board"></div>

    <div id="win-panel">
        <div class="panel-content">
            <img id="star-img" src="stars/0 Stars.webp" class="star-display">
            <button class="restart-btn" onclick="location.reload()">PLAY AGAIN</button>
        </div>
    </div>
</div>

<script>
    const board = document.getElementById('board');
    const winPanel = document.getElementById('win-panel');
    const starImg = document.getElementById('star-img');
    const timerDisplay = document.getElementById("timer");
    
    const INITIAL_TIME = 61;
    let timeLeft = INITIAL_TIME; 
    let timerInterval = null;
    let selectedIndex = null;
    let gameActive = true;

    let tiles = Array.from({ length: 9 }, (_, i) => ({
        id: i,
        bgX: (i % 3) * 50,
        bgY: Math.floor(i / 3) * 50,
        rotation: [0, 90, 180, 270][Math.floor(Math.random() * 4)]
    }));

    tiles.sort(() => Math.random() - 0.5);

    function updateTimerDisplay() {
        const mins = Math.floor(timeLeft / 60);
        const secs = timeLeft % 60;
        timerDisplay.innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        if (timeLeft <= 10) timerDisplay.style.color = "#ff4d4d";
        else timerDisplay.style.color = "#e74c3c";
    }

    function startTimer() {
        timerInterval = setInterval(() => {
            if (!gameActive) return;
            timeLeft--;
            updateTimerDisplay();
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                gameActive = false;
                alert("Game Over!");
            }
        }, 1000);
    }

    function render() {
        board.innerHTML = '';
        tiles.forEach((tileData, index) => {
            const tileDiv = document.createElement('div');
            tileDiv.className = 'tile';
            if (selectedIndex === index) tileDiv.classList.add('selected');
            if (tileData.id === index && tileData.rotation === 0) tileDiv.classList.add('correct');

            tileDiv.style.backgroundPosition = `${tileData.bgX}% ${tileData.bgY}%`;
            tileDiv.style.transform = `rotate(${tileData.rotation}deg)`;

            tileDiv.onclick = () => { if(gameActive) handleTileClick(index); };
            tileDiv.ondblclick = () => {
                if(!gameActive) return;
                tileData.rotation = (tileData.rotation + 90) % 360;
                render();
                checkWin();
            };
            board.appendChild(tileDiv);
        });
    }

    function handleTileClick(index) {
        if (selectedIndex === null) {
            selectedIndex = index;
        } else {
            if (isAdjacent(selectedIndex, index)) {
                [tiles[selectedIndex], tiles[index]] = [tiles[index], tiles[selectedIndex]];
                selectedIndex = null;
            } else {
                selectedIndex = index;
            }
        }
        render();
        checkWin();
    }

    function isAdjacent(idx1, idx2) {
        const x1 = idx1 % 3, y1 = Math.floor(idx1 / 3);
        const x2 = idx2 % 3, y2 = Math.floor(idx2 / 3);
        return (Math.abs(x1 - x2) + Math.abs(y1 - y2)) === 1;
    }

    function checkWin() {
        const win = tiles.every((t, i) => t.id === i && t.rotation === 0);
        if (win) {
            gameActive = false;
            clearInterval(timerInterval);
            showWinPanel();
        }
    }

    function showWinPanel() {
        const timeSpent = INITIAL_TIME - timeLeft;
        let starFile = "stars/1 Star.webp";

        if (timeSpent <= 30) starFile = "stars/3 Stars.webp";
        else if (timeSpent <= 45) starFile = "stars/2 Stars.webp";
        else starFile = "stars/1 Star.webp";

        starImg.src = starFile;
        winPanel.style.display = 'flex';
    
    }

    function increaseLevel() {
        let lvText = document.getElementById('level-display');
        let currentLv = parseInt(lvText.innerText.replace('Lv. ', ''));
        lvText.innerText = `Lv. ${currentLv + 1}`;
    }

    render();
    startTimer();
</script>

</body>
</html>
