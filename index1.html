<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puzzle Game</title>
    <style>
        :root {
            --phone-width: 360px;
            --phone-height: 640px;
            --grid-size: 310px;
            --img-url: url('img.jpg'); /* Ensure this matches your filename */
            --wood-light: #d2a679;
            --wood-dark: #8b5a2b;
            --gold: #f1c40f;
        }

        body {
            background-color: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        /* Blurred Background */
        .bg-blur {
            position: fixed;
            top: 0; left: 0;
            width: 100vw;
            height: 100vh;
            background-image: var(--img-url);
            background-size: cover;
            background-position: center;
            filter: blur(15px);
            z-index: -1;
            opacity: 0.5;
        }

        .mobile-frame {
            width: var(--phone-width);
            height: var(--phone-height);
            background: rgba(0,0,0,0.8);
            border-radius: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
            border: 8px solid #333;
        }

        /* UI Bars Container */
        .ui-container {
            width: 90%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 30px;
            z-index: 10;
        }

        .ui-bar {
            background: linear-gradient(to bottom, var(--wood-light), var(--wood-dark));
            border: 3px solid #5d3a1a;
            border-radius: 50px;
            display: flex;
            align-items: center;
            padding: 4px 12px;
            color: white;
            font-weight: bold;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
        }

        .icon-circle {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: var(--gold);
            border: 2px solid #b8860b;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 8px;
            font-size: 12px;
        }

        /* Timer Styling */
        #timer {
            margin-top: 20px;
            background: rgba(0,0,0,0.7);
            padding: 8px 20px;
            border-radius: 10px;
            font-size: 1.5rem;
            font-weight: 800;
            color: #e74c3c;
            border: 2px solid #e74c3c;
        }

        .puzzle-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            width: var(--grid-size);
            height: var(--grid-size);
            gap: 4px;
            margin-top: 40px;
        }

        .tile {
            width: 100%;
            height: 100%;
            background-image: var(--img-url);
            background-size: var(--grid-size) var(--grid-size);
            cursor: pointer;
            transition: all 0.3s ease;
            border-radius: 6px;
            box-sizing: border-box;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .tile.selected {
            border: 2px solid #fff;
            transform: scale(0.92);
            box-shadow: 0 0 15px #fff;
        }

        .tile.correct {
            border: 2px solid #00ffcc;
            border-radius: 0;
            filter: brightness(1.1);
        }

        #win-msg {
            margin-top: 20px;
            color: #00ffcc;
            font-weight: bold;
            display: none;
            text-shadow: 0 0 10px #00ffcc;
        }

        .add-btn {
            background: #4caf50;
            border: 1px solid white;
            border-radius: 50%;
            color: white;
            cursor: pointer;
            width: 24px;
            height: 24px;
            margin-left: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

<div class="bg-blur"></div>

<div class="mobile-frame">
    <div class="ui-container">
        <div class="ui-bar">
            <div class="icon-circle">🏠</div>
            <span id="level-display">Lv. 1</span>
            <button class="add-btn" onclick="increaseLevel()">+</button>
        </div>
        <div class="ui-bar">
            <div class="icon-circle">⚙️</div>
        </div>
    </div>

    <div id="timer">01:00</div>
    
    <div class="puzzle-board" id="board"></div>
    
    <div id="win-msg">✨ GALAXY ALIGNED ✨</div>
</div>

<script>
    const board = document.getElementById('board');
    const winMsg = document.getElementById('win-msg');
    const timerDisplay = document.getElementById("timer");
    
    let timeLeft = 61; 
    let timerInterval = null;
    let selectedIndex = null;
    let gameActive = true;

    // 1. Data Logic
    let tiles = Array.from({ length: 9 }, (_, i) => ({
        id: i,
        bgX: (i % 3) * 50,
        bgY: Math.floor(i / 3) * 50,
        rotation: [0, 90, 180, 270][Math.floor(Math.random() * 4)]
    }));

    tiles.sort(() => Math.random() - 0.5);

    // 2. Timer Logic
    function updateTimerDisplay() {
        const minutes = Math.floor(timeLeft / 60);
        const seconds = timeLeft % 60;
        timerDisplay.innerText = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
    }

    function startTimer() {
        clearInterval(timerInterval);
        updateTimerDisplay();
        timerInterval = setInterval(() => {
            if (!gameActive) {
                clearInterval(timerInterval);
                return;
            }
            timeLeft--;
            updateTimerDisplay();
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                gameActive = false;
                alert("Time's up!");
            }
        }, 1000);
    }

    // 3. Rendering
    function render() {
        board.innerHTML = '';
        tiles.forEach((tileData, index) => {
            const tileDiv = document.createElement('div');
            tileDiv.className = 'tile';
            if (selectedIndex === index) tileDiv.classList.add('selected');
            if (tileData.id === index && tileData.rotation === 0) tileDiv.classList.add('correct');

            tileDiv.style.backgroundPosition = `${tileData.bgX}% ${tileData.bgY}%`;
            tileDiv.style.transform = `rotate(${tileData.rotation}deg)`;

            tileDiv.onclick = () => {
                if(!gameActive) return;
                handleTileClick(index);
            };
            
            tileDiv.ondblclick = () => {
                if(!gameActive) return;
                tileData.rotation = (tileData.rotation + 90) % 360;
                render();
                checkWin();
            };

            board.appendChild(tileDiv);
        });
    }

    function handleTileClick(index) {
        if (selectedIndex === null) {
            selectedIndex = index;
        } else {
            if (isAdjacent(selectedIndex, index)) {
                [tiles[selectedIndex], tiles[index]] = [tiles[index], tiles[selectedIndex]];
                selectedIndex = null;
            } else {
                selectedIndex = index;
            }
        }
        render();
        checkWin();
    }

    function isAdjacent(idx1, idx2) {
        const x1 = idx1 % 3, y1 = Math.floor(idx1 / 3);
        const x2 = idx2 % 3, y2 = Math.floor(idx2 / 3);
        return (Math.abs(x1 - x2) + Math.abs(y1 - y2)) === 1;
    }

    function checkWin() {
        const win = tiles.every((t, i) => t.id === i && t.rotation === 0);
        if (win) {
            winMsg.style.display = 'block';
            gameActive = false;
            clearInterval(timerInterval);
        }
    }

    function increaseLevel() {
        let lvText = document.getElementById('level-display');
        let currentLv = parseInt(lvText.innerText.replace('Lv. ', ''));
        lvText.innerText = `Lv. ${currentLv + 1}`;
    }

    // Start everything
    render();
    startTimer();
</script>

</body>
</html>
